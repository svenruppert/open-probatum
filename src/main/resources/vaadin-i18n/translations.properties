# ── Security features view ─────────────────────────────────────
security.hero.eyebrow=Powered by jSentinel
security.hero.title=Security, wired in
security.hero.lede=The template doesn''t roll its own auth. It composes jSentinel — a production-grade Java security stack with annotation-driven access control, persistent audit, drift detection and a layered bootstrap SPI. Here''s what''s already in place.
security.section.identity.title=Identity & credentials
security.section.identity.subtitle=How the template proves a visitor is who they claim to be.
security.section.access.title=Authorization & access
security.section.access.subtitle=How the template decides which routes a subject may see.
security.section.audit.title=Audit & sessions
security.section.audit.subtitle=What the template records, and how an operator inspects it.
security.architecture.title=Layered bootstrap — additive by design
security.architecture.body=Three BootstrapExtension implementations are registered via META-INF/services and applied in order(). Adding a fourth layer (MFA, multi-tenant, …) is one new SPI implementation + one line in services — the existing code does not change.
security.footer.lead=Want to know more about the security stack?
security.footer.link=Visit the jSentinel project

# ── Security feature cards ─────────────────────────────────────
security.card.argon2id.title=Argon2id hashing
security.card.argon2id.body=BouncyCastle modern profile (~250 ms per hash). PBKDF2 hashes from earlier installs are auto-rehashed on next successful login.
security.card.bootstrap.title=First-admin bootstrap
security.card.bootstrap.body=One-time token printed at JVM start + persisted to ./data/jsentinel/bootstrap.token. The setup form consumes the token, then disappears.
security.card.preflight.title=Password preflight
security.card.preflight.body=Local blocklist of the 19 most-common passwords plus a Have-I-Been-Pwned k-anonymity range check. Plaintext never leaves the JVM — only the first 5 SHA-1 hex chars are transmitted. Disabled in tests via the app.hibp.enabled system property; fail-open on network errors.
security.card.bruteforce.title=Brute-force protection
security.card.bruteforce.body=LoginAttemptPolicy throttles repeated failures. Counter is per-subject, decays automatically.
security.card.roles.title=Role + permission catalog
security.card.roles.body=AuthorizationRole enum (ADMIN, USER) → permission set via AppAuthorizationService. Permissions are the granular unit; roles are convenience bundles.
security.card.annotations.title=@VisibleFor / @RequiresPermission
security.card.annotations.body=Drop the annotation on a view, the LoginListener + RoleAccessEvaluator do the rest. Unrestricted views are public by default.
security.card.drift.title=Drift detection (Phase-4c)
security.card.drift.body=Role changes bump the subject''s JSentinelVersion. The next click on the affected user''s session reroutes to /login — no stale grants survive an admin''s revoke. The version counter is persisted to Eclipse-Store, so a revoke before a JVM restart still kicks the user on the next request after restart.
security.card.propagation.title=Token propagation (V00.74 API ready)
security.card.propagation.body=The jSentinel 00.74 TokenCredentialStore + OutboundTokenStrategy stack is on the classpath. The moment the app starts calling a REST backend, a @PropagateToken annotation routes the subject''s Bearer / OIDC / refresh token into the outbound Authorization header — no manual HttpClient plumbing. VaadinSessionTokenCredentialStore already lives in the session, ready to be wired into a PropagationBootstrapExtension when needed.
security.card.audit.title=Persistent audit log
security.card.audit.body=Every login, logout, role change, session event lands in an Eclipse-Store-backed log + an in-memory ring buffer for the live /audit grid.
security.card.sessions.title=Session inventory
security.card.sessions.body=/admin/sessions lists every active subject. Revoke is one click, persisted, audited.
security.card.mutation.title=Mutation-hardened core
security.card.mutation.body=PIT mutation tests with per-package coverage floors enforced in CI. Security/services/model sit at 75-90 % mutation coverage.

