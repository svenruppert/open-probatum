security.layer.default.name=Default
security.layer.default.desc=Ringpuffer-Audit + Logging + PBKDF2-Hashing
security.layer.persistence.name=Persistence
security.layer.persistence.desc=Eclipse-Store-Audit und Session-Stores
security.layer.hardening.name=Hardening
security.layer.hardening.desc=Argon2id-Hashing + Drift-Erkennung verdrahtet

