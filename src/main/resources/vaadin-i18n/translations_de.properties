# ── Security features view ─────────────────────────────────────
security.hero.eyebrow=Mit jSentinel
security.hero.title=Sicherheit eingebaut
security.hero.lede=Das Template baut keine eigene Auth — es kombiniert jSentinel: einen produktiven Java-Sicherheits-Stack mit annotationsbasierter Zugriffskontrolle, persistentem Audit, Drift-Erkennung und geschichtetem Bootstrap-SPI. Das ist bereits eingebaut.
security.section.identity.title=Identität & Anmeldedaten
security.section.identity.subtitle=Wie das Template prüft, dass ein Besucher ist, wer er behauptet zu sein.
security.section.access.title=Autorisierung & Zugriff
security.section.access.subtitle=Wie das Template entscheidet, welche Routen ein Subjekt sehen darf.
security.section.audit.title=Audit & Sitzungen
security.section.audit.subtitle=Was das Template aufzeichnet und wie ein Operator es einsieht.
security.architecture.title=Geschichteter Bootstrap — additiv konzipiert
security.architecture.body=Drei BootstrapExtension-Implementierungen werden via META-INF/services registriert und in order()-Reihenfolge ausgeführt. Eine vierte Schicht (MFA, Multi-Mandanten …) ist eine neue SPI-Implementierung plus eine Zeile in services — der bestehende Code bleibt unverändert.
security.footer.lead=Mehr über den Sicherheits-Stack erfahren?
security.footer.link=Zum jSentinel-Projekt

# ── Security feature cards ─────────────────────────────────────
security.card.argon2id.title=Argon2id-Hashing
security.card.argon2id.body=BouncyCastle „modern"-Profil (~250 ms pro Hash). PBKDF2-Hashes aus älteren Installationen werden beim nächsten erfolgreichen Login automatisch neu gehasht.
security.card.bootstrap.title=Erst-Admin-Bootstrap
security.card.bootstrap.body=Einmal-Token wird beim JVM-Start auf die Konsole gedruckt und in ./data/jsentinel/bootstrap.token persistiert. Das Setup-Formular verbraucht das Token und verschwindet danach.
security.card.preflight.title=Passwort-Preflight
security.card.preflight.body=Lokale Blocklist der 19 häufigsten Passwörter plus Have-I-Been-Pwned-k-Anonymity-Range-Check. Klartext verlässt nie die JVM — nur die ersten 5 SHA-1-Hex-Zeichen werden übertragen. In Tests via System-Property app.hibp.enabled deaktiviert; fail-open bei Netzwerkfehlern.
security.card.bruteforce.title=Brute-Force-Schutz
security.card.bruteforce.body=LoginAttemptPolicy drosselt wiederholte Fehlversuche. Zähler pro Subjekt, klingt automatisch ab.
security.card.roles.title=Rollen- und Berechtigungskatalog
security.card.roles.body=AuthorizationRole-Enum (ADMIN, USER) → Permissions via AppAuthorizationService. Permissions sind die feinkörnige Einheit; Rollen sind Bündel.
security.card.annotations.title=@VisibleFor / @RequiresPermission
security.card.annotations.body=Annotation an die View, den Rest erledigen LoginListener und RoleAccessEvaluator. Unannotierte Views sind standardmäßig öffentlich.
security.card.drift.title=Drift-Erkennung (Phase-4c)
security.card.drift.body=Rollenänderungen erhöhen die JSentinelVersion des Subjekts. Der nächste Klick in der betroffenen Sitzung leitet auf /login um — keine veralteten Rechte überleben einen Admin-Revoke. Der Versionszähler wird in Eclipse-Store persistiert, sodass ein Revoke vor einem JVM-Neustart die Sitzung beim ersten Request danach trotzdem verwirft.
security.card.propagation.title=Token-Propagation (V00.74 API bereit)
security.card.propagation.body=Der jSentinel-00.74-Stack mit TokenCredentialStore + OutboundTokenStrategy liegt auf dem Classpath. Sobald die App ein REST-Backend aufruft, leitet eine @PropagateToken-Annotation das Bearer-/OIDC-/Refresh-Token des Subjekts in den ausgehenden Authorization-Header — ohne manuelles HttpClient-Plumbing. VaadinSessionTokenCredentialStore sitzt schon in der Session, bereit für eine PropagationBootstrapExtension wenn nötig.
security.card.audit.title=Persistentes Audit-Log
security.card.audit.body=Jeder Login, Logout, jede Rollenänderung und jedes Session-Ereignis landet im Eclipse-Store-Log plus im In-Memory-Ringpuffer für das Live-/audit-Grid.
security.card.sessions.title=Sitzungs-Inventar
security.card.sessions.body=/admin/sessions zeigt jedes aktive Subjekt. Widerruf mit einem Klick — persistiert und auditiert.
security.card.mutation.title=Mutationsgehärteter Kern
security.card.mutation.body=PIT-Mutationstests mit per-Package-Coverage-Schwellen, im CI erzwungen. Security/Services/Model liegen bei 75-90 % Mutation Coverage.

